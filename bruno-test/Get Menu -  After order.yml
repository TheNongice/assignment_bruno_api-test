info:
  name: Get Menu -  After order
  type: http
  seq: 7

http:
  method: GET
  url: "{{baseUrl}}/menu"
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        const r = res.getBody();

        // Store the value
        if (Array.isArray(r) && r.length >= 2) {
          bru.setEnvVar("stateMenu", r);
        }

        // Get the original state
        const originalState = bru.getEnvVar('stateMenuOrg');
        const item_pos = bru.getVar('item_pos');

        bru.setVar('priceCompare', originalState[item_pos].stock-1);

        bru.setNextRequest("Add Orders - Enter quantity more than stock");
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.body
      operator: isArray
    - expression: res.body.length
      operator: eq
      value: "2"
    - expression: res.body[item_pos].stock
      operator: eq
      value: "{{priceCompare}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
