info:
  name: Get Orders (Fake order)
  type: http
  seq: 6

http:
  method: GET
  url: "{{baseUrl}}/orders/{{orderID-missing}}"
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: bru.setNextRequest('Get Menu -  After order');
  assertions:
    - expression: res.status
      operator: eq
      value: "404"
    - expression: res.body.error
      operator: isNotEmpty

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
