info:
  name: Authentication - Wrong credentials
  type: http
  seq: 1

http:
  method: POST
  url: "{{baseUrl}}/auth/login"
  body:
    type: json
    data: |-
      {
        "username": "student",
        "password": ""
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: bru.setNextRequest("Authentication - Correct Credentials")
  assertions:
    - expression: res.status
      operator: eq
      value: "401"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
