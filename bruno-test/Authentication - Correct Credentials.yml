info:
  name: Authentication - Correct Credentials
  type: http
  seq: 2

http:
  method: POST
  url: "{{baseUrl}}/auth/login"
  body:
    type: json
    data: |-
      {
        "username": "student",
        "password": "hungry"
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        const token = res.getBody().accessToken;
        if (token) {
          bru.setEnvVar("token", token);
        }
        bru.setNextRequest("Get Menu -  Before order");
  assertions:
    - expression: res.status
      operator: eq
      value: "200"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
