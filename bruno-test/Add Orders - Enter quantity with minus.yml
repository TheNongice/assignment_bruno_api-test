info:
  name: Add Orders - Enter quantity with minus
  type: http
  seq: 10

http:
  method: POST
  url: "{{baseUrl}}/orders"
  body:
    type: json
    data: |-
      {
        "itemId": {{itemId}},
        "quantity": {{itemQuantity}}
      }
  auth:
    type: bearer
    token: "{{token}}"

runtime:
  variables:
    - name: itemId
      value: "2"
    - name: itemQuantity
      value: "-1"
  scripts:
    - type: after-response
      code: bru.setNextRequest('Add Orders - Enter quantity as \'0\'');
  assertions:
    - expression: res.status
      operator: neq
      value: "200"
    - expression: res.body.status
      operator: neq
      value: created

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
